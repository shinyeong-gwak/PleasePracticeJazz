{% extends "layout.html" %}

{% block content %}

<section class="page-shell">
    <div class="page-header">
        <div>
            <p class="eyebrow">Score Tools</p>
            <h1>MusicXML Renderer</h1>
            <p class="page-copy">생성된 악보를 미리 보고, 바로 MusicXML 파일로 내려받을 수 있습니다.</p>
        </div>
    </div>

    <div id="scoreList" class="score-list"></div>

    <div id="output" class="viewer">
        파일을 선택하세요.
    </div>

    <div class="render-actions">
        <button id="downloadScoreButton" class="primary-button" type="button" disabled>
            MusicXML 다운로드
        </button>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.9.2/build/opensheetmusicdisplay.min.js"></script>
<script src="/static/js/render.js"></script>
{% endblock %}
