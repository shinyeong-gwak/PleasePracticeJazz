<style>
    body {
        font-family: sans-serif;
        margin: 20px;
    }

    textarea {
        width: 100%;
        height: 300px;
    }

    #output {
        margin-top: 20px;
        border: 1px solid #ddd;
        padding: 10px;
        overflow-x: auto;
    }
</style>
{% extends "layout.html" %}

{% block content %}

<h2>🎼 MusicXML Live Renderer</h2>

<textarea id="xmlInput" placeholder="여기에 MusicXML 붙여넣기"></textarea>

<br>
<button onclick="render()">Render</button>

<div id="output">SVG will appear here</div>

<script>
    async function render() {
        const xml = document.getElementById("xmlInput").value;

        if (!xml.trim()) {
            alert("XML 넣어라");
            return;
        }

        const res = await fetch("/render", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ xml })
        });

        const svg = await res.text();

        document.getElementById("output").innerHTML = svg;
    }
</script>


{% endblock %}
