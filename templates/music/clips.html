{% extends "layout.html" %}

{% block content %}
<section class="page-shell clips-page">
    <div class="page-header">
        <div>
            <p class="eyebrow">Clip Studio</p>
            <h1>클립 만들기</h1>
            <p class="page-copy">폴더 안의 MP3를 고르고 필요한 구간만 잘라 lick 파일로 저장해요.</p>
        </div>
    </div>

    <section class="clips-layout">
        <article class="card clips-browser">
            <div class="clips-browser-head">
                <div>
                    <h2>음원</h2>
                    <p class="section-count" data-audio-selected-label>선택된 음원이 없어요</p>
                </div>

                <div class="clips-folder-tools">
                    <button type="button" class="icon-button" data-folder-menu-toggle aria-label="폴더 관리" title="폴더 관리">📂</button>
                    <div class="folder-menu" data-folder-menu hidden>
                        <label class="settings-field">
                            <span class="practice-field-label">정렬</span>
                            <select data-audio-sort>
                                <option value="name-asc">이름 오름차순</option>
                                <option value="name-desc">이름 내림차순</option>
                                <option value="folder-first">폴더 먼저</option>
                            </select>
                        </label>
                        <label class="settings-field">
                            <span class="practice-field-label">폴더 이름</span>
                            <input type="text" data-folder-name placeholder="새 폴더">
                        </label>
                        <div class="folder-menu-actions">
                            <button type="button" class="secondary-button" data-folder-create>추가</button>
                            <button type="button" class="secondary-button" data-folder-rename>이름변경</button>
                            <button type="button" class="danger-button" data-folder-delete>삭제</button>
                        </div>
                        <div class="folder-menu-status" data-folder-status></div>
                    </div>
                </div>
            </div>

            <div class="audio-track-actions" data-track-actions hidden>
                <div class="audio-track-actions-head">
                    <strong data-track-selected-title>선택된 음원</strong>
                    <span class="audio-track-actions-sub" data-track-selected-folder>현재 폴더: 루트</span>
                </div>
                <div class="audio-track-actions-grid">
                    <button type="button" class="icon-button" data-track-move-up aria-label="위로" title="위로">▴</button>
                    <button type="button" class="icon-button" data-track-move-down aria-label="아래로" title="아래로">▾</button>
                    <select data-track-folder-target aria-label="이동할 폴더"></select>
                    <button type="button" class="secondary-button" data-track-move-folder>이동</button>
                    <button type="button" class="secondary-button" data-track-move-root>루트로</button>
                </div>
            </div>

            <select id="fileSelect" class="hidden" aria-hidden="true">
                {% for file in mp3_files %}
                <option value="{{ file }}">{{ file }}</option>
                {% endfor %}
            </select>

            <div class="audio-tree" data-audio-tree></div>
        </article>

        <article class="card clips-editor">
            <div class="clips-player-card">
                <audio id="player" controls></audio>
                <button type="button" class="primary-button" onclick="loadAudio()">불러오기</button>
            </div>

            <div class="clip-controls-grid">
                <label class="settings-field">
                    <span class="practice-field-label">속도</span>
                    <select id="playbackRate" onchange="changePlaybackRate()">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1.0x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2.0x</option>
                    </select>
                </label>

                <label class="settings-field">
                    <span class="practice-field-label">Pitch</span>
                    <select id="pitch">
                        <option value="-3">-3</option>
                        <option value="-2">-2</option>
                        <option value="-1">-1</option>
                        <option value="0" selected>0</option>
                        <option value="1">+1</option>
                        <option value="2">+2</option>
                        <option value="3">+3</option>
                    </select>
                </label>

                <button type="button" class="secondary-button clip-grid-button" onclick="createPitchVersion()">피치 생성</button>
            </div>

            <div class="clip-time-grid">
                <label class="settings-field">
                    <span class="practice-field-label">Start</span>
                    <input id="startTime" type="text" placeholder="1:25">
                </label>
                <div class="clip-inline-actions">
                    <button type="button" onclick="captureStart()">현재 위치</button>
                    <button type="button" onclick="moveStart()">이동</button>
                </div>

                <label class="settings-field">
                    <span class="practice-field-label">End</span>
                    <input id="endTime" type="text" placeholder="1:32">
                </label>
                <div class="clip-inline-actions">
                    <button type="button" onclick="captureEnd()">현재 위치</button>
                    <button type="button" onclick="moveEnd()">이동</button>
                </div>
            </div>

            <label class="settings-field">
                <span class="practice-field-label">Clip 이름</span>
                <input id="clipName" type="text" placeholder="intro / bridge-alt / take2">
            </label>

            <p class="clip-help">
                저장 이름은 원본음원-입력값.mp3 형식으로 만들어져요. 비워두면 원본음원-lick-1.mp3 규칙을 사용합니다.
            </p>

            <div class="clip-editor-actions">
                <button type="button" class="primary-button" onclick="createClip()">Clip 생성</button>
            </div>
        </article>
    </section>
</section>

{% endblock %}

{% block scripts %}
<script src="/static/js/clips.js"></script>
{% endblock %}
