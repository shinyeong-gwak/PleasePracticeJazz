{% extends "layout.html" %}

{% block content %}
<section class="page-shell clips-page">
    <div class="page-header">
        <div>
            <p class="eyebrow">Clip Studio</p>
            <h1>?대┰ 留뚮뱾湲?/h1>
            <p class="page-copy">?대뜑 ?덉쓽 MP3瑜?怨좊Ⅴ怨??꾩슂??援ш컙留??섎씪 lick ?뚯씪濡???ν빐??</p>
        </div>
    </div>

    <section class="clips-layout">
        <article class="card clips-browser">
            <div class="clips-browser-head">
                <div>
                    <h2>?뚯썝</h2>
                </div>

                <div class="clips-folder-tools">
                    <button type="button" class="icon-button" data-folder-menu-toggle aria-label="?대뜑 愿由? title="?대뜑 愿由?>?뱛</button>
                    <div class="folder-menu" data-folder-menu hidden>
                        <label class="settings-field">
                            <span class="practice-field-label">?뺣젹</span>
                            <select data-audio-sort>
                                <option value="name-asc">?대쫫 ?ㅻ쫫李⑥닚</option>
                                <option value="name-desc">?대쫫 ?대┝李⑥닚</option>
                                <option value="folder-first">?대뜑 癒쇱?</option>
                            </select>
                        </label>
                        <label class="settings-field">
                            <span class="practice-field-label">?대뜑 ?대쫫</span>
                            <input type="text" data-folder-name placeholder="???대뜑">
                        </label>
                        <div class="folder-menu-actions">
                            <button type="button" class="secondary-button" data-folder-create>異붽?</button>
                            <button type="button" class="secondary-button" data-folder-rename>?대쫫蹂寃?/button>
                            <button type="button" class="danger-button" data-folder-delete>??젣</button>
                        </div>
                        <div class="folder-menu-status" data-folder-status></div>
                    </div>
                </div>
            </div>

            <div class="audio-track-actions" data-track-actions hidden>
                <div class="audio-track-actions-grid">
                    <button type="button" class="icon-button" data-track-move-up aria-label="?꾨줈" title="?꾨줈">??/button>
                    <button type="button" class="icon-button" data-track-move-down aria-label="?꾨옒濡? title="?꾨옒濡?>??/button>
                    <select data-track-folder-target aria-label="?대룞???대뜑"></select>
                    <button type="button" class="secondary-button" data-track-move-folder>?대룞</button>
                    <button type="button" class="secondary-button" data-track-move-root>猷⑦듃濡?/button>
                </div>
            </div>

            <select id="fileSelect" class="hidden" aria-hidden="true">
                {% for file in mp3_files %}
                <option value="{{ file }}">{{ file }}</option>
                {% endfor %}
            </select>

            <div class="audio-tree" data-audio-tree></div>
        </article>

        <article class="card clips-editor">
            <div class="clips-player-card">
                <audio id="player" controls></audio>
                <button type="button" class="primary-button" onclick="loadAudio()">遺덈윭?ㅺ린</button>
            </div>

            <div class="clip-controls-grid">
                <label class="settings-field">
                    <span class="practice-field-label">?띾룄</span>
                    <select id="playbackRate" onchange="changePlaybackRate()">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1.0x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2.0x</option>
                    </select>
                </label>

                <label class="settings-field">
                    <span class="practice-field-label">Pitch</span>
                    <select id="pitch">
                        <option value="-3">-3</option>
                        <option value="-2">-2</option>
                        <option value="-1">-1</option>
                        <option value="0" selected>0</option>
                        <option value="1">+1</option>
                        <option value="2">+2</option>
                        <option value="3">+3</option>
                    </select>
                </label>

                <button type="button" class="secondary-button clip-grid-button" onclick="createPitchVersion()">?쇱튂 ?앹꽦</button>
            </div>

            <div class="clip-time-grid">
                <label class="settings-field">
                    <span class="practice-field-label">Start</span>
                    <input id="startTime" type="text" placeholder="1:25">
                </label>
                <div class="clip-inline-actions">
                    <button type="button" onclick="captureStart()">?꾩옱 ?꾩튂</button>
                    <button type="button" onclick="moveStart()">?대룞</button>
                </div>

                <label class="settings-field">
                    <span class="practice-field-label">End</span>
                    <input id="endTime" type="text" placeholder="1:32">
                </label>
                <div class="clip-inline-actions">
                    <button type="button" onclick="captureEnd()">?꾩옱 ?꾩튂</button>
                    <button type="button" onclick="moveEnd()">?대룞</button>
                </div>
            </div>

            <label class="settings-field">
                <span class="practice-field-label">Clip ?대쫫</span>
                <input id="clipName" type="text" placeholder="intro / bridge-alt / take2">
            </label>

            <p class="clip-help">
                ????대쫫? ?먮낯?뚯썝-?낅젰媛?mp3 ?뺤떇?쇰줈 留뚮뱾?댁졇?? 鍮꾩썙?먮㈃ ?먮낯?뚯썝-lick-1.mp3 洹쒖튃???ъ슜?⑸땲??
            </p>

            <div class="clip-editor-actions">
                <button type="button" class="primary-button" onclick="createClip()">Clip ?앹꽦</button>
            </div>
        </article>
    </section>
</section>

{% endblock %}

{% block scripts %}
<script src="/static/js/clips.js"></script>
{% endblock %}
