{% extends "layout.html" %}

{% block content %}

<div class="lick-workbench">

    <!-- LEFT: LIST -->
    <div class="panel left">
        <h3>Licks</h3>

        {% for lick in licks %}
        <div class="lick-item" onclick="selectLick('{{ lick }}')">
            {{ lick }}
        </div>
        {% endfor %}

        <div id="metaBox"></div>

    </div>

    <!-- CENTER -->
    <div class="panel center">

        <audio controls id="audioPlayer">
            <button onclick="skip(-15)">⏪ 15s</button>
            <button onclick="playAudio()">▶</button>
            <button onclick="pauseAudio()">⏸</button>
            <button onclick="stopAudio()">⏹</button>
            <button onclick="skip(15)">15s ⏩</button>
        </audio>
        <div class="time-display">
            <span id="currentTime">0:00</span>
            /
            <span id="duration">0:00</span>
        </div>

        <input id="seekBar" type="range">
        <div class="controls">

            <select id="pitchVal">

                <option value="-6">-6</option>
                <option value="-5">-5</option>
                <option value="-4">-4</option>
                <option value="-3">-3</option>
                <option value="-2">-2</option>
                <option value="-1">-1</option>
                <option value="0" selected>0</option>
                <option value="1">+1</option>
                <option value="2">+2</option>
                <option value="3">+3</option>
                <option value="4">+4</option>
                <option value="5">+5</option>
                <option value="6">+6</option>

            </select>
            <div>
                Tempo:
                <input id="tempo" max="200" min="30" type="range" value="100">
                <span id="tempoVal">100%</span>
            </div>

            <button onclick="applyEffects()">Apply</button>
            <button onclick="resetEffects()">
                Reset
            </button>
        </div>

        <!-- 악보 / 분석 영역 -->
        <div class="notation-area">
            <div class="sequencer">

                <div class="track">
                    <h4>이름</h4>
                    <input id="lickName">
                </div>

                <div class="track">

                    <h4>Key</h4>

                    <select id="keyInput">

                        <option value="C">C</option>
                        <option value="Db">Db</option>
                        <option value="D">D</option>
                        <option value="Eb">Eb</option>
                        <option value="E">E</option>
                        <option value="F">F</option>
                        <option value="F#">F#</option>
                        <option value="G">G</option>
                        <option value="Ab">Ab</option>
                        <option value="A">A</option>
                        <option value="Bb">Bb</option>
                        <option value="B">B</option>

                    </select>

                </div>
                <div class="track">

                    <h4>Time</h4>

                    <select id="timeInput">

                        <option value="4/4">
                            4/4
                        </option>

                        <option value="3/4">
                            3/4
                        </option>

                        <option value="6/8">
                            6/8
                        </option>

                    </select>

                </div>
                <!-- CODE -->
                <div class="track">
                    <h4>코드</h4>
                    <input id="chordsInput" value="| Cm7 | F7 | BbM7 |">
                </div>

                <label>Grid</label>
                <select id="gridSelect" onchange="renderScore()">
                    <option selected value="8">8 (8 subdivisions)</option>
                    <option value="12">12 (triplet)</option>
                    <option value="16">16</option>
                    <option value="20">20 (5-tuplet)</option>
                    <option value="24">24 (6-tuplet)</option>
                </select>

                <!-- RIGHT HAND -->
                <div class="track">
                    <h4>오른손 - 멜로디</h4>
                    <textarea id="melodyInput" placeholder="|d5 eb5 g5 bb5 | d6 bb5 g5 eb5 |"></textarea>
                </div>

                <div class="track">
                    <h4>멜로디 리듬</h4>
                    <textarea
                            id="melodyRhythmInput"
                            placeholder="| 8 8 8 8 8 8 8 8 | 8 8 8 8 8 8 8 8|"></textarea>
                </div>

                <div class="track">
                    <h4>음정</h4>
                    <textarea
                            id="degreesInput"
                            placeholder="2 b3 5 b7"></textarea>
                </div>

                <!-- LEFT HAND -->
                <div class="track">
                    <h4>왼손 - 보이싱</h4>
                    <textarea id="voicingInput"
                              placeholder="c5-eb5-g5-bb5 | f5-a5-c6-eb6 |"></textarea>
                </div>

                <div class="track">
                    <h4>보이싱 리듬</h4>
                    <textarea
                            id="voicingRhythmInput"
                            placeholder="1"></textarea>
                </div>

                <button onclick="renderSequencer()">Render</button>
                <button onclick="renderScore()">Render Score</button>
                <button onclick="saveLick()">
                    Save
                </button>
                <button onclick="exportMusicXml()">
                    Export MusicXML
                </button>
                <button onclick="export12KeysMusicXml()">
                    Export 12 Keys
                </button>


            </div>

            <div
                    id="messageBox"
                    class="message-box">
            </div>

            <div class="score-container">
                <canvas id="scoreCanvas"></canvas>
            </div>
            <canvas id="sequencerCanvas"></canvas>
        </div>

    </div>

    <!-- RIGHT -->
    <div id="savedLicks">
    </div>

</div>
<script>
    document.addEventListener(
        "DOMContentLoaded", () =>
        loadSavedLicks()
    );
</script>
<script src="/static/js/licks.js"></script>
<link href="/static/css/style.css" rel="stylesheet">

{% endblock %}
