{% extends "layout.html" %}

{% block content %}

<div class="lick-workbench">

    <!-- LEFT: LIST -->
    <div class="panel left">
        <h3>Licks</h3>

        {% for lick in licks %}
        <div class="lick-item" onclick="selectLick('{{ lick }}')">
            {{ lick }}
        </div>
        {% endfor %}

        <h3>selected</h3>
        <div id="metaBox"></div>

    </div>

    <!-- CENTER -->
    <div class="panel center">

        <audio controls id="audioPlayer">
            <button onclick="skip(-15)">⏪ 15s</button>
            <button onclick="playAudio()">▶</button>
            <button onclick="pauseAudio()">⏸</button>
            <button onclick="stopAudio()">⏹</button>
            <button onclick="skip(15)">15s ⏩</button>
        </audio>
        <div class="time-display">
            <span id="currentTime">0:00</span>
            /
            <span id="duration">0:00</span>
        </div>

        <input id="seekBar" type="range">
        <div class="controls">

            <div>
                Pitch:
                <input id="pitch" max="12" min="-12" type="range" value="0">
                <span id="pitchVal">0</span>
            </div>

            <div>
                Tempo:
                <input id="tempo" max="200" min="30" type="range" value="100">
                <span id="tempoVal">100%</span>
            </div>

            <button onclick="applyEffects()">Apply</button>
        </div>

        <!-- 악보 / 분석 영역 -->
        <div class="notation-area">
            <div class="sequencer">

                <div class="track">
                    <h4>이름</h4>
                    <input id="lickName">
                </div>

                <!-- CODE -->
                <div class="track">
                    <h4>코드</h4>
                    <input id="chordsInput" value="| Cm7 | F7 | BbM7 |">
                </div>

                <label>Grid</label>
                <select id="gridSelect" onchange="renderScore()">
                    <option selected value="8">8 (8 subdivisions)</option>
                    <option value="12">12 (triplet)</option>
                    <option value="16">16</option>
                    <option value="20">20 (5-tuplet)</option>
                    <option value="24">24 (6-tuplet)</option>
                </select>

                <!-- RIGHT HAND -->
                <div class="track">
                    <h4>오른손 - 멜로디</h4>
                    <textarea id="melodyInput" value="|d5eb5g5bb5 | d6bb5g5eb5 |">|d5eb5g5bb5 | d6bb5g5eb5 |</textarea>
                </div>

                <div class="track">
                    <h4>멜로디 리듬</h4>
                    <input
                            id="melodyRhythmInput"
                            placeholder="11111111">
                </div>

                <div class="track">
                    <h4>음정</h4>
                    <input
                            id="degreesInput"
                            placeholder="2 b3 5 b7">
                </div>

                <!-- LEFT HAND -->
                <div class="track">
                    <h4>왼손 - 보이싱</h4>
                    <textarea id="voicingInput"
                              placeholder="c5-eb5-g5-bb5 | f5-a5-c6-eb6 |"></textarea>
                </div>

                <div class="track">
                    <h4>보이싱 리듬</h4>
                    <input
                            id="voicingRhythmInput"
                            placeholder="1">
                </div>

                <button onclick="renderSequencer()">Render</button>
                <button onclick="renderScore()">Render Score</button>
                <button onclick="saveLick()">
                    Save
                </button>

            </div>

            <div class="score-container">
                <canvas id="scoreCanvas"></canvas>
            </div>
            <canvas id="sequencerCanvas"></canvas>
        </div>

    </div>

    <!-- RIGHT -->
    <div id="savedLicks">
    </div>

</div>

<script src="/static/js/licks.js"></script>
<link href="/static/css/style.css" rel="stylesheet">

{% endblock %}
