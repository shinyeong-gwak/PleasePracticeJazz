{% extends "layout.html" %}

{% block head %}
<link href="/static/css/lick.css" rel="stylesheet">
{% endblock %}

{% block content %}

<div class="lick-workbench">

    <!-- LEFT: LIST -->
    <div class="panel left">
        <h3>Licks</h3>

        {% for lick in licks %}
        <div class="lick-item"
             data-file="{{ lick }}"
             onclick='selectLick({{ lick | tojson }})'>
            {{ lick }}
        </div>
        {% endfor %}

        <div id="metaBox"></div>

    </div>

    <!-- CENTER. -->
    <div class="panel center">

        <audio controls id="audioPlayer">
            <button onclick="skip(-15)">⏪ 15s</button>
            <button onclick="playAudio()">▶</button>
            <button onclick="pauseAudio()">⏸</button>
            <button onclick="stopAudio()">⏹</button>
            <button onclick="skip(15)">15s ⏩</button>
        </audio>
        <button type="button" id="lockPlayerBtn" onclick="togglePlayerLock()">
            🔓
        </button>
        <button type="button" id="loopPlayerBtn" aria-pressed="false" title="반복 꺼짐">
            🔁
        </button>
        <div class="time-display">
            <span id="currentTime">0:00</span>
            /
            <span id="duration">0:00</span>
        </div>

        <input id="seekBar" type="range">
        <div class="controls">

            <select id="pitchVal">

                <option value="-6">-6</option>
                <option value="-5">-5</option>
                <option value="-4">-4</option>
                <option value="-3">-3</option>
                <option value="-2">-2</option>
                <option value="-1">-1</option>
                <option value="0" selected>0</option>
                <option value="1">+1</option>
                <option value="2">+2</option>
                <option value="3">+3</option>
                <option value="4">+4</option>
                <option value="5">+5</option>
                <option value="6">+6</option>

            </select>
            <div>
                Tempo:
                <input id="tempo" max="200" min="30" type="range" value="100">
                <span id="tempoVal">100%</span>
            </div>

            <button onclick="applyEffects()">Apply</button>
            <button onclick="resetEffects()">
                Reset
            </button>
        </div>

        <!-- 악보 / 분석 영역 -->
        <div class="notation-area">
            <div class="sequencer">

                <div class="track">
                    <h4>이름</h4>
                    <input id="lickName">
                </div>

                <div class="track">

                    <h4>Key</h4>

                    <select id="keyInput">

                        <option value="C">C</option>
                        <option value="Db">Db</option>
                        <option value="D">D</option>
                        <option value="Eb">Eb</option>
                        <option value="E">E</option>
                        <option value="F">F</option>
                        <option value="F#">F#</option>
                        <option value="G">G</option>
                        <option value="Ab">Ab</option>
                        <option value="A">A</option>
                        <option value="Bb">Bb</option>
                        <option value="B">B</option>

                    </select>

                </div>
                <div class="track">

                    <h4>Time</h4>

                    <select id="timeInput">

                        <option value="4/4">
                            4/4
                        </option>

                        <option value="3/4">
                            3/4
                        </option>

                        <option value="6/8">
                            6/8
                        </option>

                    </select>

                </div>
                <!-- CODE -->
                <div class="track">
                    <h4>코드</h4>
                    <textarea id="chordsInput">| </textarea>
                </div>

                <label>Grid</label>
                <select id="gridSelect" onchange="renderScore()">
                    <option selected value="8">8 (8 subdivisions)</option>
                    <option value="12">12 (triplet)</option>
                    <option value="16">16</option>
                    <option value="20">20 (5-tuplet)</option>
                    <option value="24">24 (6-tuplet)</option>
                </select>

                <!-- RIGHT HAND -->
                <div class="track">
                    <h4>오른손 - 멜로디</h4>
                    <textarea id="melodyInput" placeholder="|d5 eb5 g5 bb5 | d6 bb5 g5 eb5 |"  ></textarea>
                </div>

                <div class="track">
                    <h4>멜로디 리듬</h4>
                    <textarea
                            id="melodyRhythmInput"
                            placeholder="| 8 8 8 8 8 8 8 8 | 8 8 8 8 8 8 8 8|"  ></textarea>
                </div>

                <div class="track">
                    <h4>음정</h4>
                    <textarea
                            id="degreesInput"
                            placeholder="2 b3 5 b7"  ></textarea>
                </div>

                <!-- LEFT HAND -->
                <div class="track">
                    <h4>왼손 - 보이싱</h4>
                    <textarea id="voicingInput"
                              placeholder="c5-eb5-g5-bb5 | f5-a5-c6-eb6 |"  ></textarea>
                </div>

                <div class="track">
                    <h4>보이싱 리듬</h4>
                    <textarea
                            id="voicingRhythmInput"
                            placeholder="1"   ></textarea>
                </div>

                <button class="primary-button" onclick="renderSequencer()">Render</button>
                <button class="secondary-button" onclick="renderScore()">Render Score</button>
                <button class="primary-button" id="saveLickButton" onclick="saveLick()">
                    Save
                </button>
                <button class="secondary-button" onclick="exportMusicXml()">
                    Export MusicXML
                </button>
                <button class="secondary-button" onclick="export12KeysMusicXml()">
                    Export 12 Keys
                </button>


            </div>

            <div
                    id="messageBox"
                    class="message-box">
            </div>

            <div class="score-container">
                <canvas id="scoreCanvas"></canvas>
            </div>
            <canvas id="sequencerCanvas"></canvas>
        </div>

    </div>

    <!-- RIGHT -->
    <div id="savedLicks"></div>

</div>

<div id="lickModal" class="lick-modal hidden">
    <div class="lick-modal-backdrop" onclick="closeLickModal()"></div>
    <div class="lick-modal-panel">
        <button class="modal-close-button" type="button" onclick="closeLickModal()">×</button>
        <h3 id="lickModalTitle">Saved Lick</h3>
        <div id="lickModalBody" class="lick-modal-body"></div>
        <div class="lick-modal-actions">
            <button class="secondary-button" type="button" onclick="closeLickModal()">닫기</button>
            <button class="secondary-button" type="button" onclick="loadSelectedSavedLick()">불러오기</button>
            <button class="primary-button" type="button" onclick="editSelectedSavedLick()">수정</button>
            <button class="danger-button" type="button" onclick="deleteSelectedSavedLick()">삭제</button>
        </div>
    </div>
</div>
<div id="musicKeyboard" class="music-keyboard">

    <div class="kb-row kb-rhythm-row hidden">
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="1">
            <img class="kb-rhythm-icon" src="/static/img/rhythm-whole-note.svg" alt="1">
        </button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="2">
            <img class="kb-rhythm-icon" src="/static/img/rhythm-half-note.svg" alt="2">
        </button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="3">
            <img class="kb-rhythm-icon" src="/static/img/rhythm-third-note.svg" alt="3">
        </button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="4">
            <img class="kb-rhythm-icon" src="/static/img/rhythm-quarter-note.svg" alt="4">
        </button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="6">
            <img class="kb-rhythm-icon" src="/static/img/rhythm-quarter-triplet.svg" alt="6">
        </button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="8">
            <img class="kb-rhythm-icon" src="/static/img/rhythm-eighth-note.svg" alt="8">
        </button>
    </div>

    <div class="kb-row kb-rhythm-row hidden">
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="12">
            <img class="kb-rhythm-icon" src="/static/img/rhythm-eighth-triplet.svg" alt="12">
        </button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="16">
            <img class="kb-rhythm-icon" src="/static/img/rhythm-sixteenth-note.svg" alt="16">
        </button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="20">
            <img class="kb-rhythm-icon" src="/static/img/rhythm-sixteenth-quintuplet.svg" alt="20">
        </button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="24">
            <img class="kb-rhythm-icon" src="/static/img/rhythm-sixteenth-sextuplet.svg" alt="24">
        </button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="!">
            <img class="kb-rhythm-icon" src="/static/img/rhythm-quarter-rest.svg" alt="!">
        </button>
    </div>

    <div class="kb-row kb-note-row kb-general-row">
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="C">C</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="D">D</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="E">E</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="F">F</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="G">G</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="A">A</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="B">B</button>
    </div>

    <div class="kb-row kb-note-row kb-general-row">
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="Db">D♭</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="Eb">E♭</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="Gb">G♭</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="Ab">A♭</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="Bb">B♭</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="n">♮</button>
    </div>

    <div class="kb-row kb-note-row kb-general-row">
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="C#">C♯</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="D#">D♯</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="F#">F♯</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="G#">G♯</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="A#">A♯</button>
    </div>

    <div class="kb-row kb-general-row">
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="1">1</button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="2">2</button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="3">3</button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="4">4</button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="5">5</button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="6">6</button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="7">7</button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="8">8</button>
    </div>

    <div class="kb-row kb-general-row">
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="12">12</button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="16">16</button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="20">20</button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="24">24</button>
    </div>

    <div class="kb-row kb-general-row">
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="-">-</button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="!">!</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="~">~</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="|">|</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="/">/</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="*">*</button>
    </div>

    <div class="kb-row kb-chord-row hidden">
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="C">C</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="D">D</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="E">E</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="F">F</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="G">G</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="A">A</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="B">B</button>
    </div>

    <div class="kb-row kb-chord-row hidden">
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="b">♭</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="#">♯</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="M">M</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="m">m</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="o">o</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="h">ø</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="+">+</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="/">/</button>
    </div>

    <div class="kb-row kb-chord-row hidden">
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="7">7</button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="9">9</button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="11">11</button>
        <button type="button" data-keyboard-action="insertToken" data-keyboard-value="13">13</button>
        <button type="button" data-keyboard-action="insertText" data-keyboard-value="|">|</button>
    </div>

    <div id="pianoKeyboard" class="kb-piano hidden">
        <div class="kb-piano-black-row">
            <span class="kb-piano-black-spacer"></span>
            <button type="button" class="kb-piano-key black" data-keyboard-action="playPianoNote" data-keyboard-value="C#" data-piano-frequency="277.18">C♯</button>
            <button type="button" class="kb-piano-key black" data-keyboard-action="playPianoNote" data-keyboard-value="D#" data-piano-frequency="311.13">D♯</button>
            <span class="kb-piano-black-gap"></span>
            <button type="button" class="kb-piano-key black" data-keyboard-action="playPianoNote" data-keyboard-value="F#" data-piano-frequency="369.99">F♯</button>
            <button type="button" class="kb-piano-key black" data-keyboard-action="playPianoNote" data-keyboard-value="G#" data-piano-frequency="415.30">G♯</button>
            <button type="button" class="kb-piano-key black" data-keyboard-action="playPianoNote" data-keyboard-value="A#" data-piano-frequency="466.16">A♯</button>
            <span class="kb-piano-black-spacer"></span>
        </div>
        <div class="kb-piano-white-row">
            <button type="button" class="kb-piano-key white" data-keyboard-action="playPianoNote" data-keyboard-value="C" data-piano-frequency="261.63">C</button>
            <button type="button" class="kb-piano-key white" data-keyboard-action="playPianoNote" data-keyboard-value="D" data-piano-frequency="293.66">D</button>
            <button type="button" class="kb-piano-key white" data-keyboard-action="playPianoNote" data-keyboard-value="E" data-piano-frequency="329.63">E</button>
            <button type="button" class="kb-piano-key white" data-keyboard-action="playPianoNote" data-keyboard-value="F" data-piano-frequency="349.23">F</button>
            <button type="button" class="kb-piano-key white" data-keyboard-action="playPianoNote" data-keyboard-value="G" data-piano-frequency="392.00">G</button>
            <button type="button" class="kb-piano-key white" data-keyboard-action="playPianoNote" data-keyboard-value="A" data-piano-frequency="440.00">A</button>
            <button type="button" class="kb-piano-key white" data-keyboard-action="playPianoNote" data-keyboard-value="B" data-piano-frequency="493.88">B</button>
        </div>
    </div>

    <div class="kb-row kb-bottom-row">
        <button class="mini"
                type="button"
                data-keyboard-action="togglePianoMode">
            🎹
        </button>

        <button class="wide"
                type="button"
                data-keyboard-action="spaceKey">
            Space
        </button>

        <button type="button"
                data-keyboard-action="moveCaretLeft"
                data-repeatable="true">
            ←
        </button>

        <button type="button"
                type="button"
                data-keyboard-action="moveCaretRight"
                data-repeatable="true">
            →
        </button>

        <button class="wide"
                type="button"
                data-keyboard-action="backspaceKey"
                data-repeatable="true">
            ⌫
        </button>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script id="selected-lick-file-data" type="application/json">
    {{ selected_lick_file | tojson | safe }}
</script>
<script src="/static/js/lick/audio.js"></script>
<script src="/static/js/lick/rhythm.js"></script>
<script src="/static/js/lick/score.js"></script>
<script src="/static/js/lick/storage.js"></script>
<script src="/static/js/lick/export.js"></script>
<script src="/static/js/lick/licks.js"></script>
<script src="/static/js/lick/keyboard.js"></script>
{% endblock %}
