<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page auth-page">
    <main class="auth-shell">
        <section class="auth-panel">
            <div class="auth-copy">
                <p class="eyebrow">Please Practice Jazz</p>
                <h1>로그인</h1>
                <p class="page-copy">아이디 또는 이메일로 연습 공간에 들어가요.</p>
            </div>

            <form class="auth-form" data-login-form>
                <label class="auth-field">
                    <span class="practice-field-label">아이디 또는 이메일</span>
                    <input type="text" data-login-identifier autocomplete="username" placeholder="your-id@example.com" autofocus>
                </label>

                <label class="auth-field">
                    <span class="practice-field-label">비밀번호</span>
                    <input type="password" data-login-password autocomplete="current-password" placeholder="8자 이상">
                </label>

                <div class="login-status" data-login-status></div>

                <button type="submit" class="primary-button login-submit" data-login-submit>로그인</button>
            </form>

            <div class="auth-switch">
                <span>처음 오셨나요?</span>
                <a href="/signup">회원가입</a>
            </div>
        </section>
    </main>

    <script src="/static/js/auth.js"></script>
</body>
</html>
