<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-card">
            <div class="login-copy">
                <p class="eyebrow">Duolickgo</p>
                <h1>로그인</h1>
                <p class="page-copy">Access key를 넣으면 토큰이 발급되고, 이후 모든 API 요청은 Bearer로 통신합니다.</p>
            </div>

            <form class="login-form" data-login-form>
                <label class="settings-field">
                    <span class="practice-field-label">Access key</span>
                    <input type="password" data-login-key autocomplete="current-password" placeholder="duolickgo-secret-key">
                </label>

                <div class="login-status" data-login-status></div>

                <button type="submit" class="primary-button login-submit" data-login-submit>로그인</button>
            </form>
        </section>
    </main>

    <script src="/static/js/auth.js"></script>
</body>
</html>
